# Local dev: PostgreSQL + Redis (backend service added in T005)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neo_kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neo_kanban}
      POSTGRES_DB: ${POSTGRES_DB:-neo_kanban}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
