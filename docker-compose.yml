# Local dev: PostgreSQL 16, Redis 7, FastAPI backend (Python 3.11)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neo_kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neo_kanban}
      POSTGRES_DB: ${POSTGRES_DB:-neo_kanban}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      # Override the host (Windows) path with a clean Linux path shared with the
      # bind mount below — keeps the container's sandbox identical to the host's.
      SANDBOX_ROOT: /sandbox
    volumes:
      # Hot-reload backend code without rebuilding the image
      - ./backend/app:/app/app
      # Share the agent sandbox between host and container
      - ./sandbox:/sandbox
    # Scope --reload to the app package (avoids watching .venv / node_modules)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

volumes:
  postgres_data:
