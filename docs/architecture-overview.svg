  <text x="328" y="539" text-anchor="middle" font-size="9.5" fill="#f97316">Skill Match Score</text>
  <text x="328" y="553" text-anchor="middle" font-size="9.5" fill="#f97316">Workload Balance</text>

  <!-- Monitor -->
  <rect x="410" y="502" width="140" height="56" fill="white" rx="7" stroke="#fdba74" stroke-width="1.5"/>
  <text x="480" y="523" text-anchor="middle" font-size="11" font-weight="600" fill="#7c2d12">Monitor</text>
  <text x="480" y="539" text-anchor="middle" font-size="9.5" fill="#f97316">WIP Alerts</text>
  <text x="480" y="553" text-anchor="middle" font-size="9.5" fill="#f97316">Overdue Detection</text>

  <!-- Reporter -->
  <rect x="562" y="502" width="140" height="56" fill="white" rx="7" stroke="#fdba74" stroke-width="1.5"/>
  <text x="632" y="523" text-anchor="middle" font-size="11" font-weight="600" fill="#7c2d12">Reporter</text>
  <text x="632" y="539" text-anchor="middle" font-size="9.5" fill="#f97316">Daily / Weekly</text>
  <text x="632" y="553" text-anchor="middle" font-size="9.5" fill="#f97316">Per-user Summary</text>

  <!-- Executor -->
  <rect x="714" y="502" width="140" height="56" fill="white" rx="7" stroke="#fdba74" stroke-width="1.5"/>
