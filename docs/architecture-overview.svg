  <rect x="520" y="248" width="195" height="60" fill="white" rx="7" stroke="#86efac" stroke-width="1.5"/>
  <text x="617" y="271" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Auth Service</text>
  <text x="617" y="288" text-anchor="middle" font-size="10" fill="#16a34a">JWT · bcrypt · RBAC</text>
  <text x="617" y="303" text-anchor="middle" font-size="10" fill="#16a34a">Owner / Member roles</text>

  <!-- Kanban Service -->
  <rect x="727" y="248" width="205" height="60" fill="white" rx="7" stroke="#86efac" stroke-width="1.5"/>
  <text x="829" y="271" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Kanban Service</text>
  <text x="829" y="288" text-anchor="middle" font-size="10" fill="#16a34a">WIP Enforcement</text>
  <text x="829" y="303" text-anchor="middle" font-size="10" fill="#16a34a">Task Flow · One-way</text>

