  <text x="176" y="539" text-anchor="middle" font-size="9.5" fill="#f97316">Task Decomposition</text>
  <text x="176" y="553" text-anchor="middle" font-size="9.5" fill="#f97316">Est. Hours · Skills</text>

  <!-- Assigner -->
  <rect x="258" y="502" width="140" height="56" fill="white" rx="7" stroke="#fdba74" stroke-width="1.5"/>
