  <text x="832" y="149" text-anchor="middle" font-size="10" fill="#3b82f6">WebSocket Client</text>
  <text x="832" y="166" text-anchor="middle" font-size="10" fill="#3b82f6">JWT Token Handler</text>

  <!-- ══ Arrows F→B ══ -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>
  <line x1="248" y1="200" x2="248" y2="218" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="460" y1="200" x2="460" y2="218" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="670" y1="200" x2="670" y2="218" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="832" y1="200" x2="832" y2="218" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="480" y="214" text-anchor="middle" font-size="9" fill="#94a3b8">HTTP / WebSocket</text>

