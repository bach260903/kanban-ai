  <text x="784" y="539" text-anchor="middle" font-size="9.5" fill="#f97316">NL → CRUD Actions</text>
  <text x="784" y="553" text-anchor="middle" font-size="9.5" fill="#f97316">Mutating Tools</text>

  <!-- Coder row: Groq | Claude Code | Gemini | OpenAI -->
  <rect x="280" y="570" width="400" height="56" fill="#fef3c7" rx="7" stroke="#fbbf24" stroke-width="1.5"/>
