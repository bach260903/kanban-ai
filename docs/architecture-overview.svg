  <rect x="16" y="417" width="928" height="228" fill="#fff7ed" rx="10" stroke="#fdba74" stroke-width="1.5"/>
  <!-- Label bar (orange) -->
  <rect x="16" y="417" width="80" height="228" fill="#ea580c" rx="10"/>
  <rect x="72"  y="417" width="24" height="228" fill="#ea580c"/>
