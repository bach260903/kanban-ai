  <text x="480" y="608" text-anchor="middle" font-size="10" fill="#d97706">ReAct Loop · Tool Calling · coder_node</text>
  <text x="480" y="622" text-anchor="middle" font-size="9" fill="#b45309">MAX_TOOL_ROUNDS = 12 · read_file · write_file · run_terminal</text>

  <!-- Tools Registry (right column, spans workers + coders) - REMOVED, instead show Tools pill -->
  <!-- Tools pill below coders row -->
  <rect x="106" y="636" width="708" height="0" fill="none"/>
  <!-- Small tools tag line -->
  <rect x="106" y="634" width="708" height="0" fill="none"/>

  <!-- ══ Arrows A→DB ══ -->
  <line x1="248" y1="645" x2="200" y2="663" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="480" y1="645" x2="480" y2="663" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="730" y1="645" x2="780" y2="663" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="480" y="659" text-anchor="middle" font-size="9" fill="#94a3b8">SQLAlchemy async · aioredis · ChromaDB client</text>

  <!-- ═══════════════════════════════════ LAYER 4: DATABASE ════════════════════════════════ -->
  <rect x="16" y="667" width="928" height="135" fill="#f5f3ff" rx="10" stroke="#c4b5fd" stroke-width="1.5"/>
  <!-- Label bar (purple) -->
  <rect x="16" y="667" width="80" height="135" fill="#7c3aed" rx="10"/>
  <rect x="72"  y="667" width="24" height="135" fill="#7c3aed"/>
  <text x="56" y="735" text-anchor="middle" font-size="11" font-weight="700" fill="white" transform="rotate(-90,56,735)">DATABASE</text>

  <text x="520" y="685" text-anchor="middle" font-size="10.5" fill="#6d28d9">Persistent Storage · Caching · Vector Search · Checkpointing</text>

  <!-- PostgreSQL -->
  <rect x="106" y="693" width="270" height="95" fill="white" rx="8" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="241" y="717" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">PostgreSQL 16</text>
  <text x="241" y="735" text-anchor="middle" font-size="10" fill="#7c3aed">users · boards · columns · tasks</text>
  <text x="241" y="751" text-anchor="middle" font-size="10" fill="#7c3aed">agent_runs · audit_log · skills</text>
  <text x="241" y="767" text-anchor="middle" font-size="10" fill="#7c3aed">diffs · stream_events · comments</text>
  <text x="241" y="781" text-anchor="middle" font-size="9" fill="#a78bfa">+ pgvector extension</text>

  <!-- Redis -->
  <rect x="392" y="693" width="270" height="95" fill="white" rx="8" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="527" y="717" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Redis 7</text>
  <text x="527" y="735" text-anchor="middle" font-size="10" fill="#7c3aed">Session Cache · Rate Limiting</text>
  <text x="527" y="751" text-anchor="middle" font-size="10" fill="#7c3aed">LangGraph MemorySaver</text>
  <text x="527" y="767" text-anchor="middle" font-size="10" fill="#7c3aed">Short-term Memory Checkpoints</text>
  <text x="527" y="781" text-anchor="middle" font-size="9" fill="#a78bfa">thread_id = (user_id, board_id)</text>

  <!-- ChromaDB -->
  <rect x="678" y="693" width="266" height="95" fill="white" rx="8" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="811" y="717" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">ChromaDB</text>
  <text x="811" y="735" text-anchor="middle" font-size="10" fill="#7c3aed">task_chunks · comment_chunks</text>
  <text x="811" y="751" text-anchor="middle" font-size="10" fill="#7c3aed">decision_notes · Embeddings</text>
  <text x="811" y="767" text-anchor="middle" font-size="10" fill="#7c3aed">search_similar_tasks (vector)</text>
  <text x="811" y="781" text-anchor="middle" font-size="9" fill="#a78bfa">Long-term Semantic Memory</text>

  <!-- ════════════════════════ Legend ════════════════════════ -->
  <rect x="16" y="808" width="928" height="0" fill="none"/>

  <!-- Orchestrator arrows down to workers (decorative lines) -->
