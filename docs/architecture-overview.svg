  <text x="410" y="288" text-anchor="middle" font-size="10" fill="#16a34a">/ws/agent/{board_id}</text>
  <text x="410" y="303" text-anchor="middle" font-size="10" fill="#16a34a">Stream Events · Trace Push</text>

