  <!-- Row 1: 4 boxes -->
  <!-- REST API -->
  <rect x="106" y="248" width="195" height="60" fill="white" rx="7" stroke="#86efac" stroke-width="1.5"/>
  <text x="203" y="271" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">REST API  /api/v1</text>
  <text x="203" y="288" text-anchor="middle" font-size="10" fill="#16a34a">Projects · Tasks · Users</text>
  <text x="203" y="303" text-anchor="middle" font-size="10" fill="#16a34a">Boards · Columns · Auth</text>

  <!-- WebSocket Server -->
  <rect x="313" y="248" width="195" height="60" fill="white" rx="7" stroke="#86efac" stroke-width="1.5"/>
