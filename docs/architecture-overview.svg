  <rect x="106" y="322" width="400" height="56" fill="white" rx="7" stroke="#86efac" stroke-width="1.5"/>
  <text x="306" y="346" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Agent Dispatcher</text>
  <text x="306" y="363" text-anchor="middle" font-size="10" fill="#16a34a">Coding Backend Selector · Sandbox Isolation · LangGraph Runner</text>

  <rect x="518" y="322" width="414" height="56" fill="white" rx="7" stroke="#86efac" stroke-width="1.5"/>
  <text x="725" y="346" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Audit &amp; Logging Service</text>
  <text x="725" y="363" text-anchor="middle" font-size="10" fill="#16a34a">audit_service · stream_events · Activity Log · Pending Log</text>

  <!-- ══ Arrows B→A ══ -->
  <line x1="248" y1="392" x2="248" y2="413" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="504" y1="392" x2="504" y2="413" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="720" y1="392" x2="720" y2="413" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="480" y="409" text-anchor="middle" font-size="9" fill="#94a3b8">LangGraph invoke / astream_events</text>

