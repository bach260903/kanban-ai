  <text x="202" y="132" text-anchor="middle" font-size="10" fill="#3b82f6">Drag &amp; Drop · Columns</text>
  <text x="202" y="149" text-anchor="middle" font-size="10" fill="#3b82f6">WIP Visualization</text>
  <text x="202" y="166" text-anchor="middle" font-size="10" fill="#3b82f6">Task Detail Modal</text>

  <!-- AI Chat Panel -->
  <rect x="315" y="90" width="193" height="96" fill="white" rx="8" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="411" y="115" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">AI Chat Panel</text>
  <text x="411" y="132" text-anchor="middle" font-size="10" fill="#3b82f6">Agent Trace Viewer</text>
  <text x="411" y="149" text-anchor="middle" font-size="10" fill="#3b82f6">Streaming Output</text>
  <text x="411" y="166" text-anchor="middle" font-size="10" fill="#3b82f6">Backend Selector UI</text>

