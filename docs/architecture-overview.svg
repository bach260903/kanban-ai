  <text x="480" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Kiến trúc Tổng thể Hệ thống Neo-Kanban AI</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#475569">4 lớp: Frontend · Backend · Agent Layer · Database</text>

  <!-- ═══════════════════════════════════ LAYER 1: FRONTEND ═══════════════════════════════ -->
  <rect x="16" y="64" width="928" height="136" fill="#dbeafe" rx="10" stroke="#93c5fd" stroke-width="1.5"/>
