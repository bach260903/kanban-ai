<svg width="1200" height="820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Inter, Arial, sans-serif">

  <!-- Page background -->
  <rect width="1200" height="820" fill="#f9fafb"/>

  <!-- ══════ TOP NAV ══════ -->
  <rect x="0" y="0" width="1200" height="52" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Breadcrumb -->
  <text x="20" y="30" font-size="13" fill="#6b7280">← All projects</text>
  <text x="118" y="30" font-size="13" fill="#d1d5db"> / </text>
  <text x="131" y="30" font-size="13" font-weight="600" fill="#111827">my-ecommerce-project</text>
  <!-- Top-right icons -->
  <text x="1148" y="33" font-size="20" fill="#6b7280">🔔</text>
  <circle cx="1185" cy="26" r="16" fill="#16a34a"/>
  <text x="1185" y="31" text-anchor="middle" font-size="11" font-weight="700" fill="white">BA</text>

  <!-- ══════ TABS ══════ -->
  <rect x="0" y="52" width="1200" height="40" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Documents tab (active) -->
  <text x="24" y="77" font-size="13" font-weight="600" fill="#2563eb">Documents</text>
  <rect x="24" y="89" width="74" height="2" fill="#2563eb" rx="1"/>
  <!-- Other tabs -->
  <text x="114" y="77" font-size="13" fill="#6b7280">Kanban</text>
  <text x="178" y="77" font-size="13" fill="#6b7280">Memory</text>
  <text x="240" y="77" font-size="13" fill="#6b7280">Audit log</text>
  <text x="308" y="77" font-size="13" fill="#6b7280">Constitution</text>

  <!-- ══════ CONTENT AREA ══════ -->

  <!-- ── LEFT PANEL: SPEC.md ── -->
  <rect x="0" y="92" width="598" height="728" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Panel toolbar -->
  <rect x="0" y="92" width="598" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="20" y="109" font-size="11" fill="#9ca3af">Documents /</text>
  <text x="89" y="109" font-size="13" font-weight="700" fill="#111827">SPEC.md</text>
  <!-- DRAFT badge -->
  <rect x="148" y="99" width="48" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="10"/>
  <text x="172" y="113" text-anchor="middle" font-size="9.5" font-weight="600" fill="#92400e">DRAFT</text>

  <!-- Edit buttons row -->
  <rect x="20" y="148" width="78" height="32" fill="white" stroke="#d1d5db" stroke-width="1" rx="5"/>
  <text x="59" y="168" text-anchor="middle" font-size="11" fill="#374151">Edit SPEC</text>
  <rect x="106" y="148" width="66" height="32" fill="white" stroke="#d1d5db" stroke-width="1" rx="5"/>
  <text x="139" y="168" text-anchor="middle" font-size="11" fill="#374151">Refresh</text>
  <rect x="180" y="148" width="108" height="32" fill="white" stroke="#d1d5db" stroke-width="1.5" rx="5" stroke-dasharray="4,3"/>
  <text x="234" y="168" text-anchor="middle" font-size="11" fill="#9ca3af">Version history</text>

  <!-- ── EDITOR (SPEC content) ── -->
  <rect x="0" y="190" width="598" height="316" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Line numbers column -->
  <rect x="0" y="190" width="36" height="316" fill="#f1f5f9"/>

  <!-- Lines: number + content -->
  <!-- Line 1 -->
  <text x="28" y="208" text-anchor="end" font-size="11" fill="#9ca3af" font-family="'Cascadia Code', 'Fira Code', monospace">1</text>
  <text x="44" y="208" font-size="11" font-weight="700" fill="#1e40af" font-family="'Cascadia Code', 'Fira Code', monospace">## Project Overview</text>
  <!-- Line 2 -->
  <text x="28" y="224" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">2</text>
  <!-- Line 3 -->
  <text x="28" y="240" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">3</text>
  <text x="44" y="240" font-size="11" fill="#111827" font-family="monospace">The goal of this project is to create a website that allows</text>
  <!-- Line 4 -->
  <text x="28" y="256" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">4</text>
  <text x="44" y="256" font-size="11" fill="#111827" font-family="monospace">users to manage e-commerce products and orders efficiently.</text>
  <!-- Line 5 -->
  <text x="28" y="272" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">5</text>
  <!-- Line 6 -->
  <text x="28" y="288" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">6</text>
  <text x="44" y="288" font-size="11" font-weight="700" fill="#1e40af" font-family="monospace">## Requirements</text>
  <!-- Line 7 -->
  <text x="28" y="304" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">7</text>
  <!-- Line 8 -->
  <text x="28" y="320" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">8</text>
  <text x="44" y="320" font-size="11" font-weight="600" fill="#1d4ed8" font-family="monospace">### Functional Requirements</text>
  <!-- Line 9 -->
  <text x="28" y="336" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">9</text>
  <text x="44" y="336" font-size="11" fill="#111827" font-family="monospace">1. The website shall be accessible via the Internet</text>
  <!-- Line 10 -->
  <text x="28" y="352" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">10</text>
  <text x="44" y="352" font-size="11" fill="#111827" font-family="monospace">2. The website shall support user authentication</text>
  <!-- Line 11 -->
  <text x="28" y="368" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">11</text>
  <text x="44" y="368" font-size="11" fill="#111827" font-family="monospace">3. The website shall allow browsing and searching products</text>
  <!-- Line 12 -->
  <text x="28" y="384" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">12</text>
  <text x="44" y="384" font-size="11" fill="#111827" font-family="monospace">4. The website shall support a shopping cart and checkout</text>
  <!-- Line 13 -->
  <text x="28" y="400" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">13</text>
  <!-- Line 14 -->
  <text x="28" y="416" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">14</text>
  <text x="44" y="416" font-size="11" font-weight="600" fill="#1d4ed8" font-family="monospace">### Technical Requirements</text>
  <!-- Line 15 -->
  <text x="28" y="432" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">15</text>
  <text x="44" y="432" font-size="11" fill="#111827" font-family="monospace">1. Frontend: React 18, TypeScript, Vite, Tailwind CSS</text>
  <!-- Line 16 -->
  <text x="28" y="448" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">16</text>
  <text x="44" y="448" font-size="11" fill="#111827" font-family="monospace">2. Backend: Python 3.11, FastAPI, PostgreSQL 16</text>
  <!-- Line 17 -->
  <text x="28" y="464" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">17</text>
  <text x="44" y="464" font-size="11" fill="#111827" font-family="monospace">3. Deployment: Docker Compose, Redis 7</text>
  <!-- Line 18 -->
  <text x="28" y="480" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">18</text>
  <!-- Line 19 -->
  <text x="28" y="496" text-anchor="end" font-size="11" fill="#9ca3af" font-family="monospace">19</text>
  <text x="44" y="496" font-size="11" font-weight="700" fill="#1e40af" font-family="monospace">## Success Criteria</text>

  <!-- ── HIL ACTION BAR ── -->
  <rect x="0" y="514" width="598" height="302" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Section header -->
  <text x="20" y="536" font-size="10.5" font-weight="600" fill="#374151" letter-spacing="0.5">Product owner review</text>
  <line x1="20" y1="540" x2="578" y2="540" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Approve button -->
  <rect x="20" y="548" width="100" height="36" fill="#2563eb" rx="6"/>
  <!-- Checkmark icon (simplified) -->
  <text x="32" y="570" font-size="14" fill="white">✓</text>
  <text x="70" y="570" text-anchor="middle" font-size="13" font-weight="600" fill="white">Approve</text>

  <!-- Divider -->
  <line x1="20" y1="600" x2="578" y2="600" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Request revision label -->
  <text x="20" y="620" font-size="11.5" font-weight="600" fill="#374151">Request revision</text>

  <!-- Revision textarea -->
  <rect x="20" y="630" width="558" height="100" fill="white" stroke="#d1d5db" stroke-width="1.5" rx="6"/>
  <text x="32" y="652" font-size="11" fill="#9ca3af">Describe what should change in the SPEC…</text>

  <!-- Submit revision button -->
  <rect x="20" y="744" width="130" height="36" fill="white" stroke="#d1d5db" stroke-width="1.5" rx="6"/>
  <text x="85" y="766" text-anchor="middle" font-size="12" fill="#374151">Submit revision</text>

  <!-- Muted hint -->
  <text x="20" y="798" font-size="10.5" fill="#9ca3af">Submitting revision will regenerate the SPEC based on your feedback.</text>

  <!-- ── RIGHT PANEL: PLAN.md ── -->
  <rect x="602" y="92" width="598" height="728" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Panel toolbar -->
  <rect x="602" y="92" width="598" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="622" y="109" font-size="11" fill="#9ca3af">Documents /</text>
  <text x="691" y="109" font-size="13" font-weight="700" fill="#111827">PLAN.md</text>

  <!-- Blocked state message -->
  <rect x="622" y="160" width="558" height="56" fill="#fafafa" stroke="#e5e7eb" stroke-width="1" rx="8"/>
  <text x="901" y="185" text-anchor="middle" font-size="12" fill="#6b7280">Approve the SPEC to enable Generate PLAN.</text>
  <text x="901" y="203" text-anchor="middle" font-size="11" fill="#9ca3af">The PLAN will be generated automatically after SPEC approval.</text>

  <!-- Faint lock icon area -->
  <text x="901" y="290" text-anchor="middle" font-size="48" fill="#e5e7eb">🔒</text>
  <text x="901" y="350" text-anchor="middle" font-size="13" fill="#d1d5db">PLAN generation locked</text>
  <text x="901" y="370" text-anchor="middle" font-size="11" fill="#e5e7eb">Approve SPEC first</text>

  <!-- ── DIVIDER between panels ── -->
  <rect x="598" y="92" width="4" height="728" fill="#e5e7eb"/>

  <!-- ── Annotation arrows (call-outs) ── -->
  <!-- Arrow to DRAFT badge -->
  <line x1="210" y1="109" x2="240" y2="65" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="238" y="48" width="130" height="20" fill="#fef3c7" rx="3" stroke="#d97706" stroke-width="1"/>
  <text x="303" y="61" text-anchor="middle" font-size="9" fill="#78350f">Trạng thái: DRAFT</text>

  <!-- Arrow to Approve button -->
  <line x1="125" y1="566" x2="180" y2="530" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="178" y="514" width="160" height="20" fill="#dbeafe" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="258" y="527" text-anchor="middle" font-size="9" fill="#1e40af">Nút Approve (HIL checkpoint)</text>

  <!-- Arrow to revision textarea -->
  <line x1="300" y1="680" x2="350" y2="645" stroke="#6d28d9" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="348" y="628" width="230" height="20" fill="#ede9fe" rx="3" stroke="#8b5cf6" stroke-width="1"/>
  <text x="463" y="641" text-anchor="middle" font-size="9" fill="#4c1d95">Nhập feedback → Submit revision</text>

</svg>
